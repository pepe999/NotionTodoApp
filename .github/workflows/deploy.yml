# CD – build & push Docker images do GHCR a deploy na VPS s rollbackem.
# Aktivuje se až bude existovat produkční main + nastavené Secrets (PLAN.md 0.7).
# Produkční Dockerfiles a finální deploy logika se dolaďují ve Fázi 7.
name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-api:latest
      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-web:latest

  deploy:
    name: Deploy to VPS (with rollback)
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/notionapp
            # Ulož aktuální tag pro případný rollback.
            PREVIOUS_TAG=$(cat .deployed_tag 2>/dev/null || echo "latest")
            echo "Previous: $PREVIOUS_TAG  ->  New: sha-${{ needs.build-and-push.outputs.sha_tag }}"
            export IMAGE_TAG="sha-${{ needs.build-and-push.outputs.sha_tag }}"
            docker compose pull
            docker compose up -d
            sleep 30
            # Smoke test – health endpoint; při selhání rollback.
            if ! curl -fsS http://localhost:3000/health; then
              echo "Health check FAILED – rollback na $PREVIOUS_TAG"
              export IMAGE_TAG="$PREVIOUS_TAG"
              docker compose up -d
              exit 1
            fi
            echo "sha-${{ needs.build-and-push.outputs.sha_tag }}" > .deployed_tag

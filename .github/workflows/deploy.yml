# CD – nasazení na VPS LOKÁLNÍM buildem (server je ARM / aarch64).
#
# Proč ne GHCR: image buildnutý na GitHub runneru (amd64) by na ARM serveru
# neběžel a multi-arch build je zbytečně pomalý. Všech ostatních 6 aplikací na
# tomto serveru se buildí lokálně – držíme stejný vzor (root, /opt/apps/<jméno>,
# sdílený Traefik). Viz CLAUDE.md a PLAN.md 0.4 + Fáze 7.
#
# Model: SSH na server → git reset na origin/main → docker compose build & up
#        → health check → při selhání rollback na předchozí commit.
#
# Aktivace: automaticky na push do main (zapnuto po prvním úspěšném ručním
# nasazení 2026-06-11, run #3) + ručně přes workflow_dispatch.
name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS (build on server)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH deploy s rollbackem
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_DIR=/opt/apps/notion-todo-app
            COMPOSE="docker compose -f docker-compose.prod.yml"
            cd "$APP_DIR"
            PREV=$(git rev-parse HEAD)
            echo "Předchozí commit: $PREV"
            git fetch --all --prune
            git reset --hard origin/main
            $COMPOSE up -d --build
            sleep 20
            # API není publikované na host (běží za Traefik) – health check uvnitř kontejneru.
            if ! $COMPOSE exec -T api curl -fsS http://localhost:3000/health >/dev/null 2>&1; then
              echo "Health check SELHAL – rollback na $PREV"
              git reset --hard "$PREV"
              $COMPOSE up -d --build
              exit 1
            fi
            echo "Deploy OK: $(git rev-parse HEAD)"

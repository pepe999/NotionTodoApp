# CI – lint, test, build + bezpečnostní kontroly na každém PR.
# Pozn.: akce jsou připnuté na major tag; pro produkci je doporučeno připnout
# na konkrétní commit SHA (viz PLAN.md 0.4 / 6.2).
name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

# Nejmenší nutná oprávnění; jednotlivé joby si zvýší, co potřebují.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm audit --audit-level=moderate
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  trivy:
    name: Trivy (deps + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Sken zranitelností závislostí + náhodných secrets. Misconfig sken
      # Dockerfiles se přidá ve Fázi 7.2 (dev image záměrně běží jako root).
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

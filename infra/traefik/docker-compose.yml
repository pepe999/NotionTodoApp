# Traefik reverse proxy – spouští se na VPS samostatně (PLAN.md 0.6).
#   touch acme.json && chmod 600 acme.json
#   docker compose -f infra/traefik/docker-compose.yml up -d
services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - '80:80'
      - '443:443'
      - '127.0.0.1:8080:8080' # dashboard pouze na localhost
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./acme.json:/acme.json
    networks:
      - traefik-public

networks:
  traefik-public:
    name: traefik-public
